# Production profile for AWS — use environment variables for all secrets
spring.application.name=HrmsClient
server.port=${SERVER_PORT:8080}

# Database (set SPRING_DATASOURCE_* in AWS Parameter Store / Secrets Manager / env)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT (set JWT_SECRET, JWT_EXPIRATION, JWT_REFRESH_EXPIRATION in env)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Mail (set SPRING_MAIL_* and APP_MAIL_* in env)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${APP_MAIL_FROM:noreply@yourcompany.com}
app.mail.from-name=${APP_MAIL_FROM_NAME:HRMS System}
app.mail.base-url=${APP_BASE_URL}
app.mail.admin=${APP_MAIL_ADMIN}

# Base URL of this app (e.g. https://api.yourdomain.com)
app.base-url=${APP_BASE_URL}

# Upload dirs — use absolute path or S3; ensure dir exists and is writable
app.upload.base-dir=${APP_UPLOAD_BASE_DIR:/tmp/hrms/uploads/}
app.upload.attendance-dir=${APP_UPLOAD_ATTENDANCE_DIR:/tmp/hrms/uploads/attendance/}
app.upload.profile-dir=${APP_UPLOAD_PROFILE_DIR:/tmp/hrms/uploads/profiles/}
app.upload.document-dir=${APP_UPLOAD_DOCUMENT_DIR:/tmp/hrms/uploads/documents/}
app.upload.payslip-dir=${APP_UPLOAD_PAYSLIP_DIR:/tmp/hrms/uploads/payslips/}
app.upload.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:5242880}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=email-async-
spring.task.scheduling.pool.size=5

# Actuator — expose only health for AWS target groups / load balancers
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
