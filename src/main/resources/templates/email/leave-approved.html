<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0;">
  <div style="max-width:620px;margin:30px auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <div style="background:#2e7d32;padding:25px;text-align:center;">
      <h1 style="color:#fff;margin:0;font-size:22px;"> Leave Approved</h1>
    </div>
    <div style="padding:30px;">
      <p>Dear <strong th:text="${employeeName}">Employee</strong>,</p>
      <p>Your leave request has been <strong style="color:#2e7d32;">approved</strong>.</p>

      <table style="width:100%;border-collapse:collapse;margin:20px 0;">
        <tr style="background:#f8f9fa;">
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">Leave Type</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${leaveType}">SICK</td>
        </tr>
        <tr>
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">From</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${startDate}">01 Jan 2025</td>
        </tr>
        <tr style="background:#f8f9fa;">
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">To</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${endDate}">03 Jan 2025</td>
        </tr>
        <tr>
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">Total Days</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${totalDays}">3</td>
        </tr>
        <tr style="background:#f8f9fa;">
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">Approved By</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${approvedBy}">HR Manager</td>
        </tr>
      </table>

      <p>Please ensure task handover before your leave begins. Enjoy your time off!</p>
    </div>
    <div style="background:#f8f9fa;padding:15px;text-align:center;font-size:12px;color:#888;">
      <span th:text="${companyName}">Company</span> HRMS — Automated Notification
    </div>
  </div>
</body>
</html>
