<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; background:#f4f4f4;">
  <div style="max-width:620px;margin:30px auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <div style="background:#0288d1;padding:25px;text-align:center;">
      <h1 style="color:#fff;margin:0;">Attendance Recorded</h1>
    </div>
    <div style="padding:30px;">
      <p>Dear <strong th:text="${employeeName}">Employee</strong>,</p>

      <table style="width:100%;border-collapse:collapse;margin:20px 0;">
        <tr style="background:#f8f9fa;">
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">Date</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${date}">01 Jan 2025</td>
        </tr>
        <tr>
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">Status</td>
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;color:#2e7d32;" th:text="${status}">PRESENT</td>
        </tr>
        <tr style="background:#f8f9fa;">
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">Check In</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${checkIn}">09:00</td>
        </tr>
        <tr>
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">Check Out</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${checkOut}">18:00</td>
        </tr>
        <tr style="background:#f8f9fa;">
          <td style="padding:10px;border:1px solid #dee2e6;font-weight:bold;">Working Hours</td>
          <td style="padding:10px;border:1px solid #dee2e6;" th:text="${workingHours}">9h 0m</td>
        </tr>
      </table>
    </div>
    <div style="background:#f8f9fa;padding:15px;text-align:center;font-size:12px;color:#888;">
      <span th:text="${companyName}">Company</span> HRMS — Automated Notification
    </div>
  </div>
</body>
</html>
